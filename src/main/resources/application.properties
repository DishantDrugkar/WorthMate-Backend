spring.application.name=worthmate-backend
# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/worthmate.ai
spring.datasource.username=postgres
spring.datasource.password=root5113
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=this-is-a-very-secure-secret-key-123456
jwt.expiration=86400000

# ===============================
# CORS (Frontend connection)
# ===============================
frontend.url=http://localhost:3000

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.worthmate=DEBUG


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB